{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - Daily closet</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            background-color: #f5f5f5;
            margin: 0;
            font-family: sans-serif;
        }
        .iphone-screen {
            width: 375px;
            min-height: 100vh;
            background-color: white;
            padding: 40px 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .form-group {
            width: 100%;
            margin-bottom: 20px;
        }
        label {
            display: block;
            text-align: center;
            margin-bottom: 10px;
            font-size: 18px;
            color: #333;
        }
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .login-btn {
            width: 80%;
            padding: 12px;
            background-color: #a0c4ff; /* 設計図の薄い青 */
            border: none;
            border-radius: 8px;
            color: #333;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }
        .links {
            margin-top: 30px;
            text-align: center;
            font-size: 14px;
        }
        .links a {
            display: block;
            margin-bottom: 15px;
            color: #1a73e8;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="iphone-screen">
        <h2 style="margin-bottom: 40px; font-weight: normal;">ログイン</h2>

        <form style="width: 100%; text-align: center;">
            <div class="form-group">
                <label>メールアドレス</label>
                <input type="email" placeholder="example@mail.com">
            </div>

            <div class="form-group" style="position: relative;">
                <label>パスワード</label>
                <input type="password">
                <span style="position: absolute; right: 10px; bottom: 10px; cursor: pointer;">👁️</span>
            </div>

            <div style="font-size: 14px; margin-bottom: 20px;">
                <input type="checkbox" id="auto-login">
                <label for="auto-login" style="display: inline; font-size: 14px;">次回から自動ログイン</label>
            </div>

            <button type="submit" class="login-btn">ログイン</button>
        </form>

        <div class="links">
            <a href="#">＞新規会員登録はこちら</a>
            <a href="#">＞パスワードをお忘れの方はこちら</a>
            <p style="color: #ccc;">★管理者ログイン</p>
            <p style="color: #ccc;">★ゲスト管理者ログイン</p>
        </div>
    </div>
</body>
</html>
