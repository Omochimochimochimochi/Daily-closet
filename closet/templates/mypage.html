<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイページ - Daily Closet</title>
    <style>
        /* 全体の設定（スクショの白い背景） */
        body { 
            font-family: sans-serif; 
            margin: 0; 
            background-color: #f8f9fa; /* 薄いグレーの背景 */
            display: flex; 
            justify-content: center; 
            align-items: flex-start; /* 上から順に配置 */
            min-height: 100vh; 
            padding-bottom: 70px; /* フッターの高さ分だけ下に余白を作る */
            box-sizing: border-box;
        }

        /* アプリ画面を模したコンテナ（スクショの枠） */
        .app-container { 
            background: white; 
            width: 375px; /* スマホサイズ */
            min-height: 100vh;
            border: 1px solid #333; 
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* 1. 見出し（マイページ） */
        .header {
            width: 100%;
            padding: 20px 0;
            border-bottom: 1px solid #333; /* スリット線 */
            text-align: center;
            margin-bottom: 20px;
        }
        h1 { font-size: 1.5rem; color: #333; margin: 0; }

        /* 2. ユーザー情報 */
        .user-info {
            width: 100%;
            padding: 0 20px;
            margin-bottom: 30px;
            box-sizing: border-box;
            text-align: center;
        }
        .user-label { font-size: 0.9rem; color: #555; }
        .username { font-size: 1.6rem; color: #333; margin-top: 5px; }

        /* 3. ボタンエリア */
        .button-group {
            width: 100%;
            padding: 0 40px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 15px; /* ボタン間の隙間 */
        }

        /* 共通の丸いボタン（スクショのグレー） */
        .btn { 
            display: block; 
            width: 100%; 
            padding: 18px; 
            text-decoration: none; 
            background-color: #e0e0e0; /* 薄いグレー */
            color: #333;
            border: 2px solid #555; /* 白いボタンと区別するための濃い枠 */
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 1rem;
            text-align: center;
            box-sizing: border-box; 
            transition: 0.2s;
        }
        .btn:hover { background-color: #d0d0d0; } /* マウスオンで少し濃く */

        /* 4. フッターナビゲーション（アイコンバー） */
        .footer-nav {
            width: 100%;
            height: 70px;
            background-color: #f0f0f0; / スリット下の濃いグレー /
            border-top: 1px solid #333; / スリット線 /
            position: absolute;
            bottom: 0;
            left: 0;
            display: flex;
            justify-content: space-around; /* アイコンを均等に配置 */
            align-items: center;
            padding: 0 10px;
            box-sizing: border-box;
        }
        .nav-icon {
            font-size: 2rem; /* アイコンの大きさ */
            color: #555;
            text-decoration: none;
            transition: 0.2s;
        }
        .nav-icon:hover { color: #333; transform: scale(1.1); } /* マウスオンで少し大きく */
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <h1>マイページ</h1>
        </div>

        <div class="user-info">
            <div class="user-label">ユーザー：</div>
            <div class="username">abcd 様</div>
        </div>

        <div class="button-group">
            <a href="#" class="btn">お気に入りアイテム一覧 💖</a>
            <a href="#" class="btn">ユーザー名変更 👤</a>
            <a href="#" class="btn">メールアドレス変更 💌</a>
            <a href="#" class="btn">パスワード変更 🔑</a>
        </div>

        <div class="footer-nav">
            <a href="#" class="nav-icon">🏡</a> <a href="#" class="nav-icon">🔍</a> <a href="#" class="nav-icon">🛒</a> <a href="#" class="nav-icon">👤</a> </div>
    </div>

</body>
</html>
