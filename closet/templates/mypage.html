<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイページ - Daily Closet</title>
    <style>
        /* 基本レイアウト */
        body { margin: 0; min-height: 100vh; display: flex; justify-content: center; background-color: #f8f9fa; font-family: sans-serif; }
        .app-container { 
            background: white; width: 375px; min-height: 100vh; 
            display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        /* コンテンツエリア */
        .content-wrapper { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .header { width: 100%; padding: 20px 0; border-bottom: 1px solid #333; text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.5rem; margin: 0; }
        .user-display { margin-bottom: 30px; font-weight: bold; font-size: 1.1rem; }
        .button-group { width: 100%; display: flex; flex-direction: column; gap: 15px; }
        .btn { 
            display: block; width: 100%; padding: 18px; background-color: #e0e0e0; 
            color: #333; border: 2px solid #555; border-radius: 12px; 
            text-align: center; text-decoration: none; font-weight: bold; box-sizing: border-box;
        }

        /* フッター：ご希望のグレー背景デザイン */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 375px;
            height: 65px;
            background-color: #d3d3d3;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #bbb;
            z-index: 1000;
        }
        .nav-item { text-decoration: none; display: flex; flex-direction: column; align-items: center; }
        .nav-icon { font-size: 1.5rem; }

        /* モーダル */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.6); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content { background: white; width: 85%; max-width: 300px; padding: 25px; border-radius: 15px; text-align: center; }
        .modal-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn-update-modal { width: 100%; padding: 12px; background-color: #333; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="content-wrapper">
            <div class="header"><h1>マイページ</h1></div>
            <div class="user-display">ユーザー：{{ request.user.username }} 様</div>

            <div class="button-group">
                <a href="{% url 'closet:consideration_list' %}" class="btn">お気に入りアイテム一覧 💗</a>
                <a href="javascript:void(0)" class="btn" onclick="document.getElementById('usernameModal').style.display='flex'">ユーザー名変更 👤</a>
                <a href="{% url 'closet:email_change' %}" class="btn">メールアドレス変更 💌</a>
                <a href="{% url 'closet:password_change' %}" class="btn">パスワード変更 🔑</a>
            </div>
        </div>

        <div class="bottom-nav">
            <a href="{% url 'closet:top' %}" class="nav-item"><span class="nav-icon">🏠</span></a>
            <a href="{% url 'closet:search_results' %}" class="nav-item"><span class="nav-icon">🔍</span></a>
            <a href="{% url 'closet:consideration_list' %}" class="nav-item"><span class="nav-icon">🛒</span></a>
            <a href="{% url 'closet:mypage' %}" class="nav-item"><span class="nav-icon">👤</span></a>
        </div>
    </div>

    <div id="usernameModal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="font-size: 1.2rem;">ユーザー名編集</h2>
            <input type="text" class="modal-input" value="{{ request.user.username }}" readonly>
            <input type="text" class="modal-input" placeholder="新しいユーザー名を入力">
            <button class="btn-update-modal">更新する</button>
            <p onclick="document.getElementById('usernameModal').style.display='none'" style="cursor:pointer; color:gray; margin-top:10px;">キャンセル</p>
        </div>
    </div>

</body>
</html>
