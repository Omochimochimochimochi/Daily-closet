<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>送信完了 - Daily Closet</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background-color: #f8f9fa; }
        .box { background: white; padding: 40px; border: 1px solid #333; width: 450px; text-align: center; }
        h2 { font-size: 18px; margin-bottom: 40px; line-height: 1.5; }
        .message { font-size: 14px; line-height: 2; margin-bottom: 40px; color: #333; }
        .link-back { display: inline-block; color: #1a73e8; text-decoration: underline; font-size: 14px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>パスワード再設定メール<br>送信完了画面</h2>
        
        <div class="message">
            パスワード再設定用メールを送信しました。<br>
            パスワード再設定用のリンクをお送りしました。<br>
            リンクからパスワードを再設定してください。
        </div>

        <a href="{% url 'login' %}" class="link-back">ログイン画面へ戻る</a>
    </div>
</body>
</html>
