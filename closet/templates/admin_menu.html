<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>管理メニュー - Daily Closet</title>

<body>
    <div class="app-container">

        <div class="button-group">

            background-color: #f8f9fa;

        .btn-admin {

        .footer-nav {
            position: fixed;
            bottom: 0;
            left: 50%;

 </style>
