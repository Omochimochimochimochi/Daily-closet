<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>完了！ - Daily Closet</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f8f9fa; }
        .box { background: white; padding: 40px; border: 1px solid #333; width: 350px; text-align: center; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); }
        .check-icon { font-size: 3rem; margin-bottom: 10px; }
        h2 { font-size: 1.5rem; color: #333; margin-bottom: 5px; }
        .thank-you { font-style: italic; color: #888; margin-bottom: 30px; }
        
        .btn { display: block; width: 100%; padding: 12px; text-decoration: none; border-radius: 25px; margin-bottom: 12px; font-weight: bold; transition: 0.3s; box-sizing: border-box; }
        
        /* 青いボタン：メインのアクション */
        .btn-blue { background-color: #a0c4ff; color: white; }
        .btn-blue:hover { background-color: #8db5f0; }
        
        /* 白いボタン：サブのアクション */
        .btn-white { background-color: white; color: #333; border: 2px solid #333; }
        .btn-white:hover { background-color: #eee; }
    </style>
</head>
<body>
    <div class="box">
        <div class="check-icon">✅</div>
        <h2>設定が完了しました！✨</h2>
        <p class="thank-you">Thank You</p>
        
        <a href="#" class="btn btn-blue">トップ画面へ移動 🏠</a>
        <a href="#" class="btn btn-white">マイページへ 👤</a>
</body>
</html>
