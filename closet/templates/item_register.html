<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>アイテム登録 - Daily Closet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
    body { font-family: sans-serif; background-color: #f8f9fa; margin: 0; display: flex; justify-content: center; }
    .app-container { width: 375px; background: white; min-height: 100vh; padding: 20px; border: 1px solid #ddd; box-sizing: border-box; position: relative; padding-bottom: 60px; }
    
    h2 { font-size: 16px; margin-bottom: 20px; text-align: center; font-weight: bold; }
    
    .image-upload-section { text-align: center; margin-bottom: 25px; }
    .image-preview-box { 
        width: 150px; height: 180px; 
        border: 2px solid #333; 
        margin: 0 auto; 
        display: flex; flex-direction: column; align-items: center; justify-content: center; 
        background-color: #fdfdfd; cursor: pointer; 
    }
    .image-preview-box p { margin: 2px 0; font-size: 12px; }
    .image-preview-box .icon { font-size: 24px; }
    
    .add-image-link { 
        display: inline-block; 
        color: blue; text-decoration: underline; 
        font-size: 12px; margin-top: 5px; 
        cursor: pointer; 
    }

    #modal-overlay, #modal-overlay-detail {
        display: none; 
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.5); z-index: 1000;
    }

    .modal-content {
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        background: white; padding: 20px; width: 300px; border-radius: 10px; text-align: center; box-sizing: border-box;
    }
    
    .main-preview-area {
        width: 100%; height: 200px;
        border: 1px solid #ccc; background: #eee;
        display: flex; align-items: center; justify-content: center; font-size: 11px; color: #666; margin-bottom: 15px;
    }

    .thumbnail-list {
        display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 15px;
    }

    .thumbnail-item {
        position: relative;
        width: 50px; height: 50px;
        border: 1px solid #ddd; background: #fdfdfd;
    }
  
    .thumbnail-delete-btn {
        position: absolute; top: -5px; right: -5px;
        width: 16px; height: 16px;
        background: rgba(0,0,0,0.5); border-radius: 50%;
        color: white; font-size: 12px; font-weight: bold; border: none;
        cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    .modal-close-btn {
        position: absolute; top: -10px; right: -10px;
        width: 25px; height: 25px;
        background: #fff; border: 1px solid #ccc; border-radius: 50%;
        cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px;
    }

    .form-row { display: flex; gap: 10px; margin-bottom: 15px; }
    .form-group { flex: 1; text-align: left; }
    .form-group-full { width: 100%; text-align: left; margin-bottom: 15px; }
    
    label { display: block; font-size: 11px; margin-bottom: 5px; color: #333; }
    input[type="text"], select { 
        width: 100%; padding: 10px; 
        border: 1px solid #ccc; border-radius: 3px; 
        font-size: 14px; box-sizing: border-box; 
    }
    
    .input-item-name { 
        width: 100%; padding: 10px; 
        border: 1px solid #ccc; border-radius: 3px; 
        font-size: 16px; text-align: center; 
        box-sizing: border-box; 
    }

    .menu-icon { 
        position: absolute; bottom: 20px; right: 20px; 
        width: 30px; height: 30px; 
        background: #eee; border-radius: 50%; 
        display: flex; align-items: center; justify-content: center; 
        border: 1px solid #ccc; font-size: 16px;
    }

    textarea { 
        width: 100%; padding: 10px; 
        border: 1px solid #ccc; border-radius: 3px; 
        font-size: 14px; box-sizing: border-box; 
        resize: vertical; 
    }

    .detail-image-box {
        width: 100px; height: 120px; 
        border: 1px solid #333; margin: 0 auto; 
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background-color: #fff; cursor: pointer;
    }

  
    .tag-input-container {
        display: flex; gap: 5px; margin-bottom: 10px;
    }


    .tag-list {
        display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px;
    }
    .tag-badge {
        display: flex; align-items: center; gap: 5px;
        background: #f0f0f0; border: 1px solid #ccc;
        border-radius: 15px; padding: 5px 10px; font-size: 12px; color: #333;
    }
    .tag-remove-btn {
        background: none; border: none; color: #999; 
        font-weight: bold; cursor: pointer; font-size: 14px; padding: 0;
    }
</style>
</head>
<body>

<div class="app-container">
    <h2>アイテム登録画面</h2>
    
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div class="image-upload-section">
            <div class="image-preview-box" onclick="openModal();">
                <p>アイテム画像</p>
                <p class="icon">📷</p>
                <p>金額</p>
            </div>
            <p class="add-image-link" onclick="openModal();">画像を追加</p>
        </div>

        <div class="form-group-full">
            <label>ブランド名</label>
            <input type="text" name="brand" placeholder="例：ユニクロ">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>金額</label>
                <select name="price">
                    <option value="">¥ ▼ (選択)</option>
                    <option value="1990">¥ 1,990</option>
                    <option value="2990">¥ 2,990</option>
                    <option value="3990">¥ 3,990</option>
                </select>
            </div>
            <div class="form-group">
                <label>カラー</label>
                <input type="text" name="color" placeholder="例：White">
            </div>
        </div>

        <div class="form-group-full">
            <label style="text-align: center;">アイテム名</label>
            <input type="text" name="name" class="input-item-name" placeholder="例：デニムシャツ" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>カテゴリー</label>
                <input type="text" name="category" placeholder="例：ブラウス">
            </div>
            <div class="form-group">
                <label>サイズ</label>
                <input type="text" name="size" placeholder="例：Free (自由記入)">
            </div>
        </div>

        <div class="form-group-full" style="margin-top: 25px;">
            <label>アイテム説明</label>
            <textarea name="description" rows="4" placeholder="アイテム説明を入力"></textarea>
        </div>

        <div class="form-group-full">
            <label>アイテム詳細（素材、洗濯表示など）</label>
            <textarea name="details" rows="4" placeholder="詳細情報を入力"></textarea>
        </div>

        <div class="image-upload-section" style="margin-top: 20px;">
            <div class="detail-image-box" onclick="openModalDetail();">
                <p style="font-size: 10px;">アイテム詳細画像</p>
                <p class="icon">📷</p>
            </div>
            <p class="add-image-link" onclick="openModalDetail();">画像を追加</p>
        </div>

        <div class="form-group-full">
            <label>アイテム詳細（素材、洗濯表示など）</label>
            <textarea name="details" rows="4" placeholder="詳細情報を入力"></textarea>
        </div>

        <div class="form-group-full" style="margin-top: 20px;">
            <label>自由記入タグ</label>
            <div class="tag-input-container">
                <input type="text" id="tag-input" placeholder="#2Way" style="flex: 1;">
                <button type="button" onclick="addTag();" style="width: 60px; background: #ddd; border: 1px solid #ccc; border-radius: 3px; font-size: 12px;">追加</button>
            </div>
            <div id="tag-list" class="tag-list"></div>
        </div>
        <div class="image-upload-section" style="margin-top: 20px;">
            <div class="detail-image-box" onclick="openModalDetail();">
                <p style="font-size: 10px;">アイテム詳細画像</p>
                <p class="icon">📷</p>
            </div>
            <p class="add-image-link" onclick="openModalDetail();">画像を追加</p>
        </div>
        
        <div class="menu-icon">≡</div>
        <a href="{% url 'inventory_manage' %}" style="display:block; text-align:center; margin-top:30px; font-size:12px; color:#666; text-decoration:none;">← 在庫管理に戻る</a>
    </form>
</div>

<div id="modal-overlay">
    <div class="modal-content">
        <button type="button" class="modal-close-btn" onclick="closeModal();">×</button>
        <div class="main-preview-area">
            <p>カメラロール内の画像を表示</p>
        </div>
        <div class="thumbnail-list">
            <div class="thumbnail-item"><button type="button" class="thumbnail-delete-btn">×</button></div>
        </div>
        <p style="font-size:10px; color:#666;">（登録上限：20枚まで）</p>
    </div>
</div>

<div id="modal-overlay-detail">
    <div class="modal-content">
        <button type="button" class="modal-close-btn" onclick="closeModalDetail();">×</button>
        <div class="main-preview-area">
            <p>詳細写真用プレビュー</p>
        </div>
        <div class="thumbnail-list">
            <div class="thumbnail-item"><button type="button" class="thumbnail-delete-btn">×</button></div>
        </div>
        <p style="font-size:10px; color:#666;">※詳細（ポケット、洗濯表示など）</p>
    </div>
</div>

<script>
    function openModal() { document.getElementById('modal-overlay').style.display = 'block'; }
    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
    function openModalDetail() { document.getElementById('modal-overlay-detail').style.display = 'block'; }
    function closeModalDetail() { document.getElementById('modal-overlay-detail').style.display = 'none'; }
    function addTag() {
        const input = document.getElementById('tag-input');
        const tagText = input.value.trim();
        if (tagText !== "") {
            const tagList = document.getElementById('tag-list');
            const tagBadge = document.createElement('div');
            tagBadge.className = 'tag-badge';
            const displayTag = tagText.startsWith('#') ? tagText : '#' + tagText;
            tagBadge.innerHTML = `${displayTag}<button type="button" class="tag-remove-btn" onclick="this.parentElement.remove();">×</button>`;
            tagList.appendChild(tagBadge);
            input.value = ""; 
        }
    }
</script>

</body>
</html>
