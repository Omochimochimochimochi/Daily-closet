<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>アイテム登録 - Daily Closet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
    body { font-family: sans-serif; background-color: #f8f9fa; margin: 0; display: flex; justify-content: center; }
    .app-container { width: 375px; background: white; min-height: 100vh; padding: 20px; border: 1px solid #ddd; box-sizing: border-box; position: relative; padding-bottom: 60px; }
    h2 { font-size: 16px; margin-bottom: 20px; text-align: center; font-weight: bold; }
    .image-upload-section { text-align: center; margin-bottom: 25px; }
    .image-preview-box { width: 150px; height: 180px; border: 2px solid #333; margin: 0 auto; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #fdfdfd; cursor: pointer; }
    .image-preview-box p { margin: 2px 0; font-size: 12px; }
    .image-preview-box .icon { font-size: 24px; }
    .add-image-link { display: inline-block; color: blue; text-decoration: underline; font-size: 12px; margin-top: 5px; cursor: pointer; }
    #modal-overlay, #modal-overlay-detail { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
    .modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; width: 300px; border-radius: 10px; text-align: center; box-sizing: border-box; }
    .form-row { display: flex; gap: 10px; margin-bottom: 15px; }
    .form-group { flex: 1; text-align: left; }
    .form-group-full { width: 100%; text-align: left; margin-bottom: 15px; }
    label { display: block; font-size: 11px; margin-bottom: 5px; color: #333; }
    input[type="text"], select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 3px; font-size: 14px; box-sizing: border-box; }
    .input-item-name { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 3px; font-size: 16px; text-align: center; box-sizing: border-box; }
    .tag-input-container { display: flex; gap: 5px; margin-bottom: 10px; }
    .tag-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
    .tag-badge { display: flex; align-items: center; gap: 5px; background: #f0f0f0; border: 1px solid #ccc; border-radius: 15px; padding: 5px 10px; font-size: 12px; color: #333; }
    .tag-remove-btn { background: none; border: none; color: #999; font-weight: bold; cursor: pointer; font-size: 14px; padding: 0; }
    
    /* 固定タグ選択用のスタイル */
    .tag-list input[type="checkbox"] { display: none; }
    .tag-label-span { display: inline-block; border: 1px solid #ccc; padding: 5px 12px; border-radius: 20px; cursor: pointer; background-color: #f0f0f0; font-size: 12px; transition: 0.2s; }
    
    .save-btn { width: 100%; background-color: #a0c4ff; color: white; border: none; padding: 15px; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 30px; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>アイテム登録画面</h2>
    
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div class="image-upload-section">
            <div class="image-preview-box" onclick="openModal();">
                <p>アイテム画像</p>
                <p class="icon">📷</p>
            </div>
            <p class="add-image-link" onclick="openModal();">画像を追加</p>
        </div>

        <div class="form-group-full">
            <label>ブランド名</label>
            <input type="text" name="brand" placeholder="例：ユニクロ">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>金額</label>
                <input type="text" name="price" placeholder="¥">
            </div>
            <div class="form-group">
                <label>カラー</label>
                <input type="text" name="color" placeholder="例：White">
            </div>
        </div>

        <div class="form-group-full">
            <label style="text-align: center;">アイテム名</label>
            <input type="text" name="name" class="input-item-name" placeholder="例：デニムシャツ" required>
        </div>

        <hr style="border: 0.5px solid #eee; margin: 20px 0;">
        <h3>タグ選択</h3>
        {% for category in categories %}
            <div class="tag-group" style="margin-bottom: 15px;">
                <label>■ {{ category.name }}</label>
                <div class="tag-list">
                    {% for tag in category.tags.all %}
                        <label>
                            <input type="checkbox" name="tags" value="{{ tag.id }}">
                            <span class="tag-label-span">#{{ tag.name }}</span>
                        </label>
                    {% endfor %}
                </div>
            </div>
        {% endfor %}

        <div class="form-group-full" style="margin-top: 20px;">
            <label>自由記入タグ</label>
            <div class="tag-input-container">
                <input type="text" id="tag-input" placeholder="#2Way" style="flex: 1;">
                <button type="button" onclick="addTag();" style="width: 60px; background: #ddd; border: 1px solid #ccc; border-radius: 3px; font-size: 12px;">追加</button>
            </div>
            <div id="tag-list" class="tag-list"></div>
        </div>

        <div class="form-group-full">
            <label>アイテム説明</label>
            <textarea name="description" rows="4" placeholder="アイテム説明を入力"></textarea>
        </div>

        <button type="submit" class="save-btn">保存</button>
        
        <a href="{% url 'inventory_manage' %}" style="display:block; text-align:center; margin-top:30px; font-size:12px; color:#666; text-decoration:none;">← 在庫管理に戻る</a>
    </form>
</div>

<div id="modal-overlay">
    <div class="modal-content">
        <button type="button" class="modal-close-btn" onclick="closeModal();">×</button>
        <div class="main-preview-area">
            <p>カメラロール内の画像を表示</p>
        </div>
        <div class="thumbnail-list">
            <div class="thumbnail-item"><button type="button" class="thumbnail-delete-btn">×</button></div>
        </div>
        <p style="font-size:10px; color:#666;">（登録上限：20枚まで）</p>
    </div>
</div>

<div id="modal-overlay-detail">
    <div class="modal-content">
        <button type="button" class="modal-close-btn" onclick="closeModalDetail();">×</button>
        <div class="main-preview-area">
            <p>詳細写真用プレビュー</p>
        </div>
        <div class="thumbnail-list">
            <div class="thumbnail-item"><button type="button" class="thumbnail-delete-btn">×</button></div>
        </div>
        <p style="font-size:10px; color:#666;">※詳細（ポケット、洗濯表示など）</p>
    </div>
</div>

<script>
    function openModal() { document.getElementById('modal-overlay').style.display = 'block'; }
    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
  
    document.addEventListener('change', function(e) {
        if (e.target.name === 'tags') {
            const span = e.target.nextElementSibling;
            if (e.target.checked) {
                span.style.backgroundColor = '#1a73e8';
                span.style.color = 'white';
            } else {
                span.style.backgroundColor = '#f0f0f0';
                span.style.color = '#333';
            }
        }
    });

    function addTag() {
        const input = document.getElementById('tag-input');
        const tagText = input.value.trim();
        if (tagText !== "") {
            const tagList = document.getElementById('tag-list');
            const tagBadge = document.createElement('div');
            tagBadge.className = 'tag-badge';
            const displayTag = tagText.startsWith('#') ? tagText : '#' + tagText;
            tagBadge.innerHTML = `${displayTag}<button type="button" class="tag-remove-btn" onclick="this.parentElement.remove();">×</button>`;
            tagList.appendChild(tagBadge);
            input.value = ""; 
        }
    }
</script>
</body>
</html>
