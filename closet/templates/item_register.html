<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>アイテム登録 - Daily Closet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background-color: #f8f9fa; margin: 0; display: flex; justify-content: center; }
        .app-container { width: 375px; background: white; min-height: 100vh; padding: 20px; border: 1px solid #ddd; box-sizing: border-box; position: relative; padding-bottom: 60px; }
        h2 { font-size: 16px; margin-bottom: 20px; text-align: center; font-weight: bold; }
        .image-upload-section { text-align: center; margin-bottom: 25px; }
        .image-preview-box { width: 150px; height: 180px; border: 1px solid #333; margin: 0 auto; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #fdfdfd; cursor: pointer; }
        .image-preview-box .icon { font-size: 24px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .form-group { flex: 1; text-align: left; }
        .form-group-full { width: 100%; text-align: left; margin-bottom: 15px; }
        label { display: block; font-size: 11px; margin-bottom: 5px; color: #333; font-weight: bold; }
        input[type="text"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 3px; font-size: 14px; box-sizing: border-box; }
        .input-item-name { text-align: center; font-size: 16px; }
        h3 { font-size: 14px; text-align: center; color: #555; margin: 30px 0 10px; }
        .tag-group { margin-bottom: 20px; }
        .tag-category-title { font-size: 13px; margin-bottom: 10px; color: #333; }
        .tag-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .tag-list input[type="checkbox"] { display: none; }
        .tag-label-span { display: inline-block; border: 1px solid #ccc; padding: 6px 14px; border-radius: 10px; cursor: pointer; background-color: white; font-size: 12px; color: #666; transition: 0.2s; }
        .tag-list input[type="checkbox"]:checked + .tag-label-span { background-color: #cbdcf7; border-color: #a0c4ff; color: #333; }
        .free-tag-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; }
        .free-tag-input-area { display: flex; gap: 8px; margin-bottom: 10px; align-items: stretch; }
        .add-tag-btn { background: #eee; border: 1px solid #ccc; padding: 0 15px; border-radius: 3px; cursor: pointer; font-size: 14px; min-width: 70px; white-space: nowrap; }
        .added-tag-badge { display: flex; align-items: center; gap: 5px; background: white; border: 1px solid #ccc; padding: 5px 10px; border-radius: 10px; font-size: 12px; }
        .tag-remove-x { color: #999; cursor: pointer; font-weight: bold; margin-left: 5px; }
        .save-btn { width: 100%; background-color: #a0c4ff; color: white; border: none; padding: 15px; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: not-allowed; margin-top: 30px; opacity: 0.5; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>アイテム登録画面</h2>
    <form method="POST" enctype="multipart/form-data" id="item-form">
        {% csrf_token %}
        
        <div class="image-upload-section">
    <label for="image-input">
        <div class="image-preview-box">
            <p>アイテム画像</p>
            <p class="icon">📷</p>
        </div>
    </label>
    <input type="file" name="image" id="image-input" style="display:none;" onchange="previewImage(this)">
</div>

                <div class="form-group-full">
            <label>ブランド名</label>
            <input type="text" name="brand" placeholder="例：ユニクロ" required>
        </div>

        <div class="form-row">
            <div class="form-group"><label>金額</label><input type="text" name="price" placeholder="¥" required></div>
            <div class="form-group"><label>カラー</label><input type="text" name="color" placeholder="例：White"></div>
        </div>

        <div class="form-group-full">
            <label style="text-align: center;">アイテム名</label>
            <input type="text" name="name" class="input-item-name" placeholder="例：デニムシャツ" required>
        </div>
<div class="input-group">
    <label>アイテム説明</label>
    <textarea name="description" placeholder="アイテム詳細画面の説明に記載する内容を入力"></textarea>
</div>

<div class="input-group">
    <label>アイテム詳細（素材、洗濯表示など）</label>
    <textarea name="details_text" placeholder="アイテム詳細のモーダル画面に表示させる内容を編集可能"></textarea>
</div>

<div class="detail-image-section">
    <p>詳細部分（ポケット、裏地など）の画像登録</p>
    <label for="detail-image-input" class="detail-image-preview">
        <span>+ 画像を追加</span>
    </label>
    <input type="file" name="detail_image" id="detail-image-input" style="display:none;" onchange="previewDetailImage(this)">
</div>

        
       <div class="free-tag-section">
            <label>自由記入タグ</label>
            <div class="free-tag-input-area">
                <input type="text" id="free-tag-input" placeholder="#2Way">
                <button type="button" class="add-tag-btn" onclick="addFreeTag()">追加</button>
            </div>
            <div id="added-tags-container" class="tag-list"></div>
            <input type="hidden" name="free_tags" id="free-tags-hidden">
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 30px 0;">


        <h3>タグ（複数選択）</h3>

        <div class="tag-group">
            <div class="tag-category-title">■ スタイル</div>
            <div class="tag-list">
                <label><input type="checkbox" name="style" value="シンプル" onchange="checkForm()"><span class="tag-label-span">#シンプル</span></label>
                <label><input type="checkbox" name="style" value="きれいめ" onchange="checkForm()"><span class="tag-label-span">#きれいめ</span></label>
                <label><input type="checkbox" name="style" value="Aライン" onchange="checkForm()"><span class="tag-label-span">#Aライン</span></label>
                <label><input type="checkbox" name="style" value="Iライン" onchange="checkForm()"><span class="tag-label-span">#Iライン</span></label>
                <label><input type="checkbox" name="style" value="セール" onchange="checkForm()"><span class="tag-label-span">#セール</span></label>
            </div>
        </div>

        <div class="tag-group">
            <div class="tag-category-title">■ 骨格タイプ</div>
            <div class="tag-list">
                <label><input type="checkbox" name="kokkaku" value="ストレート" onchange="checkForm()"><span class="tag-label-span">#ストレート</span></label>
                <label><input type="checkbox" name="kokkaku" value="ウェーブ" onchange="checkForm()"><span class="tag-label-span">#ウェーブ</span></label>
                <label><input type="checkbox" name="kokkaku" value="ナチュラル" onchange="checkForm()"><span class="tag-label-span">#ナチュラル</span></label>
            </div>
        </div>

        <div class="tag-group">
            <div class="tag-category-title">■ パーソナルカラー</div>
            <div class="tag-list">
                <label><input type="checkbox" name="personal_color" value="イエベ" onchange="checkForm()"><span class="tag-label-span">#イエベ</span></label>
                <label><input type="checkbox" name="personal_color" value="ブルベ" onchange="checkForm()"><span class="tag-label-span">#ブルベ</span></label>
                <label><input type="checkbox" name="personal_color" value="ニュートラル" onchange="checkForm()"><span class="tag-label-span">#ニュートラル</span></label>
            </div>
        </div>

 

        <button type="submit" class="save-btn" id="save-btn" disabled>保存</button>
        <a href="{% url 'inventory_manage' %}" style="display:block; text-align:center; margin-top:30px; font-size:12px; color:#666; text-decoration:none;">← 在庫管理に戻る</a>
    </form>

</div>

<script>
    let freeTagsList = [];

    function addFreeTag() {
        const input = document.getElementById('free-tag-input');
        let text = input.value.trim();
        if (text === "") return;
        if (!text.startsWith('#')) text = '#' + text;
        if (!freeTagsList.includes(text)) {
            freeTagsList.push(text);
            renderFreeTags();
        }
        input.value = "";
        checkForm();
    }

    function removeFreeTag(tag) {
        freeTagsList = freeTagsList.filter(t => t !== tag);
        renderFreeTags();
        checkForm();
    }

    function renderFreeTags() {
        const container = document.getElementById('added-tags-container');
        container.innerHTML = "";
        freeTagsList.forEach(tag => {
            const badge = document.createElement('div');
            badge.className = 'added-tag-badge';
            badge.innerHTML = `${tag}<span class="tag-remove-x" onclick="removeFreeTag('${tag}')">×</span>`;
            container.appendChild(badge);
        });
        document.getElementById('free-tags-hidden').value = freeTagsList.join(',');
    }

    function checkForm() {
        const nameInput = document.querySelector('input[name="name"]');
        const brandInput = document.querySelector('input[name="brand"]');
        const priceInput = document.querySelector('input[name="price"]');
        
        if (!nameInput || !brandInput || !priceInput) return;

        const name = nameInput.value.trim();
        const brand = brandInput.value.trim();
        const price = priceInput.value.trim();
        
        const styleChecked = document.querySelectorAll('input[name="style"]:checked').length > 0;
        const kokkakuChecked = document.querySelectorAll('input[name="kokkaku"]:checked').length > 0;
        const colorChecked = document.querySelectorAll('input[name="personal_color"]:checked').length > 0;
        const hasFreeTags = freeTagsList.length > 0;

        const saveBtn = document.getElementById('save-btn');
        const isReady = (name !== "" && brand !== "" && price !== "") && 
                        (styleChecked || kokkakuChecked || colorChecked || hasFreeTags);

        if (isReady) {
            saveBtn.disabled = false; 
            saveBtn.style.opacity = "1";
            saveBtn.style.cursor = "pointer";
        } else {
            saveBtn.disabled = true;
            saveBtn.style.opacity = "0.5";
            saveBtn.style.cursor = "not-allowed";
        }
    }
    document.addEventListener('input', checkForm);

    function previewImage(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const box = document.querySelector('.image-preview-box');
            box.innerHTML = `<img src="${e.target.result}" style="width:100%; height:100%; object-fit:cover;">`;
        };
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
</body>
</html>
