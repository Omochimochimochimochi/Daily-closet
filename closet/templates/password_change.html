{% extends 'base.html' %} {% block content %}
<div class="app-container">
    <div class="header">
        <h1>パスワード変更 🔑</h1>
    </div>

    <div class="form-group">
        <div class="input-wrapper">
            <label class="label-text">現在のパスワード</label>
            <div class="password-input-container">
                <input type="password" class="input-field" placeholder="現在のパスワードを入力">
                <span class="eye-icon">👁️</span>
            </div>
        </div>

        <div class="input-wrapper">
            <label class="label-text">新しいパスワード</label>
            <div class="password-input-container">
                <input type="password" class="input-field" placeholder="8文字以上、英数字含む">
                <span class="eye-icon">👁️</span>
            </div>
        </div>

        <div class="input-wrapper">
            <label class="label-text">新しいパスワード（確認用）</label>
            <div class="password-input-container">
                <input type="password" class="input-field" placeholder="もう一度入力してください">
                <span class="eye-icon">👁️</span>
            </div>
        </div>

        <button class="btn-update">変更 🚀</button>
    </div>
</div>

<style>
    
    .password-input-container {
        position: relative;
        width: 100%;
        max-width: 300px;
    }
    .eye-icon {
        position: absolute;
        right: 15px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        font-size: 1.2rem;
    }

    .btn-update {
        background-color: #a0c4ff;
        color: #4a90e2;
        border: 1px solid #4a90e2;
        /* ...その他のデザイン... */
    }
</style>
{% endblock %}
