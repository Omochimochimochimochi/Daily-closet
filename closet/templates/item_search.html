{% extends 'closet/base.html' %}
{% load static %}

{% block extra_css %}
<style>
 <style>
    /* 1. 全体コンテナの余白（みちみち感の解消） */
    .app-container {
        padding: 20px 15px; /* 左右に15pxの余裕を持たせる */
    }
    .search-box-container {
        display: flex;
        align-items: center;
        gap: 15px;
        
        /* ★ここで上側の余白を調整します */
        margin-top: 40px;      /* フォームを上に40px分押し下げる */
        margin-bottom: 30px;   /* 下のトレンドワードとの間隔 */
        
        padding: 0 15px;       /* 横幅が窮屈な場合はここも調整 */
    }
    
    .search-input {
        flex: 1;
        padding: 15px;
        border: 1px solid #333;
        border-radius: 8px; /* フォームの角を少し出す */
        background-color: #f9f9f9;
        font-size: 1rem;
    }

    /* 3. セクション（タイトルとタグ群） */
    .search-section { margin-bottom: 25px; }
    .section-title { 
        font-size: 0.9rem; 
        color: #666; 
        margin-bottom: 12px; /* タイトル下の隙間を調整 */
    }
    
    /* 4. ボタンデザイン（角出し＆白背景） */
    .tag-group {
        display: flex;
        flex-wrap: wrap; /* タグが多い場合は折り返す */
        gap: 10px;
    }
    
    .tag-btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 10px 18px;
        border: 1px solid #999;
        
        /* ★角を8pxにして、少しカクっとさせる */
        border-radius: 8px; 
        
        background-color: white; /* 背景は白 */
        text-decoration: none;
        color: #333;
        font-size: 0.85rem;
        cursor: pointer;
        white-space: nowrap;
    }
    
    .tag-btn:hover {
        background-color: #f5f5f5;
    }
</style>

{% endblock %}

{% block content %}

<form action="{% url 'closet:search_results' %}" method="GET" class="search-box-container" style="display: flex; align-items: center; gap: 10px; margin-bottom: 30px;">
    <span class="back-arrow" onclick="history.back()" style="cursor: pointer;">〈</span>
    
    <input type="text" name="tag" class="search-input" placeholder="キーワード、ハッシュタグで検索" 
           style="flex: 1; padding: 12px; border: 1px solid #333; border-radius: 10px; background-color: #f9f9f9;">
    
    <button type="submit" style="display:none;"></button>
</form>

<div class="search-section">
    <p class="section-title">トレンドワード</p>
    <div class="tag-group">
        <a href="{% url 'closet:search_results' %}?tag=セール" class="tag-btn">🔎 セール</a>
        <a href="{% url 'closet:search_results' %}?tag=アウター" class="tag-btn">🔎 アウター</a>
        <a href="{% url 'closet:search_results' %}?tag=シャツ" class="tag-btn">🔎 シャツ</a>
    </div>
</div>

<div class="search-section">
    <p class="section-title">体型・好みで探す</p>
    <div class="tag-group">
        <a href="{% url 'closet:search_results' %}?tag=洗濯可" class="tag-btn">🔎 #洗濯可</a>
        <a href="{% url 'closet:search_results' %}?tag=ブルベ" class="tag-btn">🔎 #ブルベ</a>
        <a href="{% url 'closet:search_results' %}?tag=ミニ丈" class="tag-btn">🔎 #ミニ丈</a>
    </div>
</div>
{% endblock %}
