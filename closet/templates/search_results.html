<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>検索結果 - Daily Closet</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background-color: #f8f9fa; margin: 0; display: flex; justify-content: center; }
        .app-container { width: 375px; background: white; min-height: 100vh; position: relative; border: 1px solid #ddd; padding-bottom: 80px; box-sizing: border-box; }

        /* --- ヘッダー --- */
        .header { padding: 15px; text-align: center; border-bottom: 1px solid #eee; position: relative; }
        .back-btn { position: absolute; left: 15px; top: 18px; font-size: 18px; cursor: pointer; text-decoration: none; color: #333; }
        .search-tag-display { 
            display: inline-flex; align-items: center; gap: 10px; 
            padding: 8px 20px; border: 1px solid #333; border-radius: 4px; font-size: 14px; 
        }
        .close-tag { cursor: pointer; font-weight: bold; text-decoration: none; color: #333; }

        /* --- グリッドレイアウト --- */
        .item-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; }
        .item-card { width: 100%; }
        .item-image-box { 
            aspect-ratio: 3/4; width: 100%; border: 1px solid #333; 
            background: #fff; display: flex; align-items: center; justify-content: center; 
            overflow: hidden; position: relative;
        }
        .item-image-box img { width: 100%; height: 100%; object-fit: cover; }
        .swipe-hint { position: absolute; bottom: 5px; font-size: 10px; color: #999; }
        .item-info { margin-top: 8px; font-size: 11px; line-height: 1.4; color: #333; }
        .price { font-weight: bold; }

        /* --- 絞り込みボタン（FAB） --- */
        .filter-fab { 
            position: fixed; bottom: 80px; left: 50%; transform: translateX(130px);
            width: 45px; height: 45px; border-radius: 50%; border: 1px solid #333;
            background: white; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 99;
        }

        /* --- モーダル --- */
        .modal {
            display: none; position: fixed; z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5); 
        }
        .modal-content {
            background-color: white; margin: 15% auto; padding: 25px;
            width: 80%; max-width: 300px; border: 1px solid #333; position: relative;
            border-radius: 10px;
        }
        .modal-header h3 { margin: 0; font-size: 18px; text-align: center; font-weight: normal; }
        .close-modal { position: absolute; right: 15px; top: 15px; font-size: 24px; cursor: pointer; }

        .filter-group { margin: 25px 0; }
        .filter-group label { display: block; font-size: 16px; margin-bottom: 10px; }
        
        .input-with-icon { position: relative; display: flex; align-items: center; }
        .input-with-icon input { width: 100%; padding: 10px; border: 1px solid #333; border-radius: 4px; box-sizing: border-box; }
        .search-icon-inline { position: absolute; right: 10px; cursor: pointer; }

        .category-row { 
            display: flex; justify-content: space-between; align-items: center; 
            border-top: 1px solid #eee; border-bottom: 1px solid #eee; padding: 15px 0;
        }
        .category-select { border: none; background: transparent; color: #666; font-size: 14px; cursor: pointer; outline: none; }

        .search-submit-btn { 
            width: 90%; display: block; margin: 30px auto 0; padding: 15px; 
            background-color: #999; color: white; border: 1px solid #333; 
            border-radius: 12px; font-size: 18px; cursor: pointer; 
        }

        /* --- ナビゲーション --- */
        .bottom-nav { position: fixed; bottom: 0; width: 375px; height: 60px; background: #eee; border-top: 1px solid #ddd; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { font-size: 24px; cursor: pointer; text-decoration: none; color: inherit; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <a href="javascript:history.back()" class="back-btn">〈</a>
        <div class="search-tag-display">
            <span>{{ request.GET.hashtag|default:"#すべて" }}</span>
            <a href="?" class="close-tag">×</a>
        </div>
        <div style="font-size: 14px; margin-top: 10px;">検索結果</div>
    </div>

    <div class="item-grid">
        {% for item in items %}
            <a href={% url 'closet:item_detail' item.pk %} style="text-decoration: none; color: inherit;">
                <div class="item-card">
                    <div class="item-image-box">
                        {% if item.image %}
                            <img src="{{ item.image.url }}">
                        {% else %}
                            <div style="text-align:center; font-size:11px; color:#666;">No Image</div>
                        {% endif %}
                        <div class="swipe-hint">● ○ ○</div>
                    </div>
                    <div class="item-info">
                        <div class="price">¥{{ item.price }}</div>
                        <div>{{ item.brand_name }}</div>
                        <div>{{ item.item_name }}</div>
                    </div>
                </div>
            </a>
        {% empty %}
            <p style="grid-column: 1 / span 2; text-align: center; padding: 40px 20px; color: #999;">
                条件に合うアイテムがありません。
            </p>
        {% endfor %}
    </div>

    <div class="filter-fab" onclick="toggleModal()">
        <span style="font-size: 20px;">≡</span>
    </div>

    <div id="filterModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="toggleModal()">&times;</span>
            <div class="modal-header">
                <h3>絞り込み</h3>
            </div>
            
            <form method="GET" action="">
                <div class="filter-group">
                    <label>ハッシュタグ</label>
                    <div class="input-with-icon">
                        <input type="text" name="hashtag" placeholder="#セール" value="{{ request.GET.hashtag }}">
                        <span class="search-icon-inline">🔍</span>
                    </div>
                </div>

                <div class="filter-group category-row">
                    <label style="margin:0;">カテゴリー</label>
                    <select name="category" class="category-select">
                         <option value="">すべて</option>
                         <option value="tops" {% if request.GET.category == 'tops' %}selected{% endif %}>トップス</option>
                         <option value="pants" {% if request.GET.category == 'pants' %}selected{% endif %}>パンツ</option>
                         <option value="jacket" {% if request.GET.category == 'jacket' %}selected{% endif %}>ジャケット</option>
                        <option value="skirt" {% if request.GET.category == 'skirt' %}selected{% endif %}>スカート</option>
            </select>
                </div>

                <button type="submit" class="search-submit-btn">
                    検索 🔍
                </button>
            </form>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="/" class="nav-item">🏠</a>
        <a href="#" class="nav-item">🔍</a>
        <a href="#" class="nav-item">🛒</a>
        <a href="#" class="nav-item">👤</a>
    </div>
</div>

<script>
    function toggleModal() {
        const modal = document.getElementById("filterModal");
        modal.style.display = (modal.style.display === "block") ? "none" : "block";
    }
   
    window.onclick = function(event) {
        const modal = document.getElementById("filterModal");
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }
</script>

</body>
</html>
