<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>パスワード再設定 - Daily Closet</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background-color: #f8f9fa; }
        .box { background: white; padding: 40px; border: 1px solid #333; width: 400px; text-align: center; }
        h2 { font-size: 18px; margin-bottom: 30px; }
        p { font-size: 14px; line-height: 1.6; margin-bottom: 30px; text-align: left; }
        .field { margin-bottom: 30px; text-align: center; }
        label { display: block; margin-bottom: 10px; font-weight: bold; }
        input[type="email"] { width: 80%; padding: 10px; border: 1px solid #ccc; }
        .btn-send { background-color: #a0c4ff; border: none; padding: 12px; width: 80%; font-size: 18px; border-radius: 10px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>パスワード再設定画面</h2>
        <p>パスワード再設定用のリンクをお送りします。<br>メールアドレスをご登録ください。</p>
        
        <form method="post">
    {% csrf_token %}
    <div class="field">
        <label>メールアドレス</label>
        <input type="email" name="email" required> 
    </div>
    
    <button type="submit" class="btn-send">送信</button>
</form>
    </div>
</body>
</html>
