{% extends 'closet/base.html' %}

{% block title %}検討リスト{% endblock %}

{% block extra_css %}
<style>
    /* 文字を中央に寄せるためのヘッダー設定 */
    .header { 
        width: 100%;       
        text-align: center; 
        padding: 15px 0;   
        border-bottom: 1px solid #eee; 
        font-size: 18px;
        font-weight: bold; /* 少し太くすると見出しっぽくなります */
    }

    /* 点数表示の部分 */
    .summary-text {
        text-align: center;
        padding: 10px 0;
        font-size: 14px;
        color: #666;
    }

    /* 「アイテムはありません」のメッセージ */
    .empty-message {
        text-align: center;
        margin-top: 100px;
        color: #aaa;
        font-size: 16px;
    }
</style>
{% endblock %}

{% block content %}
<div style="width: 100%; display: flex; flex-direction: column; align-items: center;">

    <div class="header">検討リスト</div>

    <div class="summary-text">
        お気に入り登録アイテム：{{ items|length }}点
    </div>

    <div style="width: 100%; max-width: 500px;">
        {% if items %}
            {% for item in items %}
                {% endfor %}
        {% else %}
            <div class="empty-message">
                検討中のアイテムはありません。
            </div>
        {% endif %}
    </div>

</div>
{% endblock %}
