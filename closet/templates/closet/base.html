{% load static %}
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Daily Closet{% endblock %}</title>
    
    <style>
        /* 全ページ共通の基本スタイル */
        body { font-family: sans-serif; margin: 0; background-color: #f8f9fa; display: flex; justify-content: center; }
        
        /* 1. 全てを包むコンテナ */
        .app-container { 
            width: 375px; 
            background: white; 
            min-height: 100vh; 
            border: 1px solid #ddd; 
            padding-bottom: 80px; 
            position: relative; 
            box-sizing: border-box; 
        }

        /* 🖼️ 画像を画面幅に収めるための設定（ここが重要！） */
        img {
            max-width: 100%; 
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* 共通フッターのスタイル */
/* ナビゲーションのCSSを以下のように書き換えてください */
.bottom-nav {
    position: fixed;
    bottom: 0;
    width: 375px;
    height: 65px;
    background-color: #d3d3d3;
    display: flex;
    justify-content: space-around;
    align-items: center;
    border-top: 1px solid #bbb;
    z-index: 1000;
}

/* アイコンを囲む箱のサイズを固定し、中身を中央寄せにする */
.nav-item {
    text-decoration: none;
    width: 50px;      /* 枠の幅を固定 */
    height: 50px;     /* 枠の高さを固定 */
    display: flex;
    justify-content: center;
    align-items: center;
}

/* アイコンのサイズを統一 */
.nav-icon {
    font-size: 24px;  /* ここで大きさをピクセル指定で完全に統一します */
    display: block;
}
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <div class="app-container">
        {% block content %}{% endblock %}

    <div class="bottom-nav">
       <a href="{% url 'closet:top' %}" class="nav-item"><span class="nav-icon">🏠</span></a>
       <a href="{% url 'closet:item_search' %}" class="nav-item"><span class="nav-icon">🔍</span></a> <a href="{% url 'closet:consideration_list' %}" class="nav-item"><span class="nav-icon">🛒</span></a>
        <a href="{% url 'closet:mypage' %}" class="nav-item"><span class="nav-icon">👤</span></a>
</div>
    </div>
    {% block extra_js %}{% endblock %}
</body>
</html>
