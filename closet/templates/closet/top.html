{% extends 'closet/base.html' %}
{% load static %}

{% block title %}Daily closet{% endblock %}

{% block content %}
    <h1 style="text-align: center; margin-top: 20px; font-weight: bold;">Daily closet</h1>
    
    <form action="{% url 'closet:search_results' %}" method="get" style="display: flex; gap: 5px; margin-bottom: 20px; padding: 0 10px;">
        <input type="text" name="q" placeholder="キーワードを入力" style="flex: 1; padding: 8px;">
        <button type="submit" style="padding: 8px;">🔍</button>
    </form> 

    <div style="margin-bottom: 15px;">
        <img src="{% static 'images/main_visual.jpg' %}" alt="メイン画像">
    </div>

    <p style="font-size: 14px; color: #666; padding: 0 10px;">
        注目のハッシュタグ：<br>#セール #ブラウン #スウェット
    </p>

    <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

    <div style="text-align: center; margin-top: 30px;">
        <a href="{% url 'closet:admin_login' %}" style="font-weight: bold; display: block; margin-bottom: 10px; color: #1a73e8; text-decoration: underline;">
            ＞ログイン
        </a>
        <a href="{% url 'closet:signup' %}" style="font-weight: bold; display: block; margin-bottom: 10px; color: #1a73e8; text-decoration: underline;">
            ＞新規会員登録はこちら
        </a>
    </div>
{% endblock %}
