<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>パスワード再設定 - Daily Closet</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background-color: #f8f9fa; }
        .box { background: white; padding: 40px; border: 1px solid #333; width: 400px; text-align: center; }
        h2 { font-size: 16px; margin-bottom: 30px; }
        .field { margin-bottom: 25px; text-align: center; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        .input-wrapper { position: relative; width: 80%; margin: 0 auto; }
        input[type="password"] { width: 100%; padding: 10px; border: 1px solid #ccc; box-sizing: border-box; }
        .eye-icon { position: absolute; right: 10px; top: 10px; cursor: pointer; }
        .hint { font-size: 11px; color: #666; margin-top: 5px; line-height: 1.4; }
        .btn-save { background-color: #a0c4ff; border: none; padding: 12px; width: 80%; font-size: 18px; border-radius: 10px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
   <div class="box">
    <h2>パスワード再設定画面</h2>
    
    <form method="post">
        {% csrf_token %}
        
        <div class="django-form-area">
            {{ form.as_p }}
        </div>

        <button type="submit" class="btn-save">保存</button>
    </form>
</div>

    <button type="submit" class="btn-save">保存</button>
</form>
</body>
</html>
