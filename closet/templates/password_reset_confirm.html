<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>パスワード再設定 - Daily Closet</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background-color: #f8f9fa; }
        .box { background: white; padding: 40px; border: 1px solid #333; width: 400px; text-align: center; }
        h2 { font-size: 16px; margin-bottom: 30px; }
        /* Djangoのフォーム（{{ form.as_p }}）をきれいに見せる設定 */
        .django-form-area p { text-align: left; font-size: 13px; margin-bottom: 15px; }
        .django-form-area input { width: 100%; padding: 10px; border: 1px solid #ccc; box-sizing: border-box; }
        .django-form-area ul { text-align: left; font-size: 11px; color: #d9534f; padding-left: 20px; }
        
        .btn-save { 
            background-color: #a0c4ff; 
            border: none; 
            padding: 12px; 
            width: 80%; 
            font-size: 18px; 
            border-radius: 10px; 
            cursor: pointer; 
            margin-top: 20px; 
        }
    </style>
</head>
<body>
    <div class="box">
        <h2>パスワード再設定画面</h2>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="django-form-area">
                {{ form.as_p }}
            </div>

            <button type="submit" class="btn-save">保存</button>
        </form>
    </div>
</body>
</html>
