<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>在庫管理 - Daily Closet</title>
    <style>
        body { font-family: sans-serif; background-color: #f8f9fa; margin: 0; display: flex; justify-content: center; }
        .app-container { width: 375px; background: white; min-height: 100vh; padding-bottom: 80px; position: relative; border: 1px solid #ddd; text-align: center; }
        
        .header { padding: 10px; border-bottom: 1px solid #eee; }
        .btn-add { display: inline-block; width: 90%; padding: 10px; background-color: #ccc; color: #333; text-decoration: none; border-radius: 5px; margin: 10px 0; font-weight: bold; }

        .item-card { display: flex; padding: 10px; border-bottom: 1px solid #eee; text-align: left; align-items: flex-start; }
        .item-img { width: 80px; height: 100px; background-color: #f0f0f0; border: 1px solid #ddd; margin-right: 10px; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #999; }
        .item-info { flex: 1; font-size: 12px; }
        .item-info p { margin: 2px 0; }
        
    
        .btn-group { margin-top: 10px; display: flex; gap: 5px; }
        .btn-status { background-color: #ddd; border: none; padding: 5px 10px; border-radius: 5px; font-size: 11px; cursor: pointer; }
        .btn-edit { background-color: #bbb; border: none; padding: 5px 15px; border-radius: 5px; font-size: 11px; cursor: pointer; text-decoration: none; color: black; }


        #modal-overlay {
            display: none; 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 1000;
        }
        .modal-content {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 20px; width: 250px; border-radius: 10px; text-align: center;
        }
        .modal-close { position: absolute; top: 5px; right: 10px; font-size: 20px; cursor: pointer; border: none; background: none; }
        .btn-save { background-color: #bbb; border: none; padding: 8px 20px; border-radius: 5px; margin-right: 5px; }
        .btn-cancel { background-color: #ddd; border: none; padding: 8px 20px; border-radius: 5px; }

        .footer-nav { position: fixed; bottom: 0; width: 375px; display: flex; justify-content: space-around; padding: 15px 0; background: #eee; border-top: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">在庫管理画面</div>
    
    <a href="{% url 'item_register' %}" class="btn-add">＋新規アイテム登録</a>
    <p style="font-size: 12px;">登録アイテム：x点</p>

    <div class="item-card">
        <div class="item-img">アイテム画像</div>
        <div class="item-info">
            <p>アイテム名：ワイドパンツ</p>
            <p>タグ：#セール, #きれいめ</p>
            <p>状態：公開中</p>
            <div class="btn-group">
                <button class="btn-status" onclick="openModal()">公開設定を変更</button>
                <a href="#" class="btn-edit">編集</a>
            </div>
        </div>
    </div>

    <div id="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" onclick="closeModal()">×</button>
            <h3>公開設定</h3>
            <select style="width: 80%; padding: 10px; margin-bottom: 20px;">
                <option>公開中</option>
                <option>非公開</option>
            </select>
            <div>
                <button class="btn-save" onclick="closeModal()">保存</button>
                <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
            </div>
        </div>
    </div>

    <div class="footer-nav">
        <a href="{% url 'top' %}" style="text-decoration:none">🏡</a>
        <a href="{% url 'inventory_manage' %}" style="text-decoration:none">👕</a>
        <a href="{% url 'admin_menu' %}" style="text-decoration:none">📋</a>
    </div>
</div>

<script>
    function openModal() { document.getElementById('modal-overlay').style.display = 'block'; }
    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
</script>

</body>
</html>
